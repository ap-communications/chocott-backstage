# Ignore files referenced by .gitignore (only valid at root)
gitignore: true

# Define glob expressions to use (only valid at root)
globs:
  - "**/*.md"

# Define glob expressions to ignore
ignores:
  - ".changeset/*.md"
  - ".github/**/*.md"
  - "**/CHANGELOG.md"
  - "deprecated/**/*.md"
  - "ignore*.md"
  - "examples/**/*.md"

config:
  MD013:
    line_length: 200
  MD024: false
  MD036: false
