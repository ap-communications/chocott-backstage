# 定義内容の詳細は以下のページを参照
# https://backstage.io/docs/features/software-catalog/descriptor-format
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name | dump }}
  annotations:
    # GitHub連携済みのPluginを有効化するためのannotation
    # CI/CDタブ（GitHub Actions）やPull Requestsタブの表示に必要
    github.com/project-slug: ${{ values.repoOwner }}/${{ values.name }}
spec:
  type: service
  owner: group:guests
  lifecycle: experimental
